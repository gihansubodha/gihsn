<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Will You Be My Valentine?</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Comic Sans MS", "Trebuchet MS", cursive, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      background: linear-gradient(135deg, #ffd1f4, #ffc2e2, #ffe1f5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ff5d73;
      touch-action: manipulation;
    }

    .page {
      position: relative;
      width: 100%;
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      isolation: isolate;
    }

    .soft-glow {
      position: absolute;
      width: min(420px, 80vw);
      height: min(420px, 80vw);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.28);
      filter: blur(10px);
      z-index: -1;
      animation: breathe 4s ease-in-out infinite;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4.8rem);
      margin-bottom: 34px;
      letter-spacing: 1px;
      color: #ff6478;
      text-shadow: 0 4px 18px rgba(255, 99, 130, 0.25);
      animation: floatTitle 3s ease-in-out infinite;
    }

    .emoji-heart {
      display: inline-block;
      animation: heartbeat 1.2s infinite;
    }

    .cat-card {
      position: relative;
      width: min(280px, 70vw);
      height: 210px;
      margin-bottom: 24px;
      animation: floatCat 3.2s ease-in-out infinite;
    }

    .cat {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      width: 205px;
      height: 135px;
      background: #49c4df;
      border: 7px solid #3b5668;
      border-radius: 50px 50px 38px 38px;
      box-shadow: 0 18px 40px rgba(255, 89, 127, 0.24);
    }

    .cat::before,
    .cat::after {
      content: "";
      position: absolute;
      top: -44px;
      width: 80px;
      height: 80px;
      background: #49c4df;
      border: 7px solid #3b5668;
      border-bottom: none;
      transform: rotate(45deg);
      border-radius: 18px 6px 0 6px;
      z-index: -1;
    }

    .cat::before { left: 13px; }
    .cat::after { right: 13px; }

    .inner-ear-left,
    .inner-ear-right {
      position: absolute;
      top: -24px;
      width: 28px;
      height: 28px;
      background: #ffb1c4;
      transform: rotate(45deg);
      border-radius: 7px;
    }

    .inner-ear-left { left: 35px; }
    .inner-ear-right { right: 35px; }

    .face {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 145px;
      height: 70px;
    }

    .eye {
      position: absolute;
      top: 12px;
      width: 34px;
      height: 18px;
      border-bottom: 6px solid #384b5b;
      border-radius: 0 0 40px 40px;
    }

    .eye.left {
      left: 10px;
      transform: rotate(14deg);
    }

    .eye.right {
      right: 10px;
      transform: rotate(-14deg);
    }

    .mouth {
      position: absolute;
      top: 34px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 28px;
    }

    .mouth::before,
    .mouth::after {
      content: "";
      position: absolute;
      top: 0;
      width: 24px;
      height: 22px;
      border-bottom: 5px solid #384b5b;
      border-radius: 0 0 24px 24px;
    }

    .mouth::before {
      left: 2px;
      transform: rotate(12deg);
    }

    .mouth::after {
      right: 2px;
      transform: rotate(-12deg);
    }

    .belly {
      position: absolute;
      left: 50%;
      bottom: -7px;
      transform: translateX(-50%);
      width: 92px;
      height: 42px;
      background: #fff7f7;
      border-radius: 50px 50px 0 0;
    }

    .paw-heart {
      position: absolute;
      left: 50%;
      top: -3px;
      transform: translateX(-50%);
      font-size: 25px;
      animation: heartbeat 1s infinite;
    }

    .buttons {
      display: flex;
      gap: clamp(16px, 4vw, 28px);
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    button {
      border: none;
      cursor: pointer;
      color: white;
      font-weight: 800;
      letter-spacing: 0.4px;
      border-radius: 999px;
      box-shadow: 0 18px 34px rgba(255, 91, 125, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      animation: floatButton 2.4s ease-in-out infinite;
      touch-action: manipulation;
      user-select: none;
    }

    button:hover {
      transform: translateY(-8px) scale(1.08);
      box-shadow: 0 22px 44px rgba(255, 91, 125, 0.38);
    }

    #yesBtn {
      font-size: clamp(1.8rem, 5vw, 3.4rem);
      padding: 22px 54px;
      background: linear-gradient(135deg, #7dc8ff, #9dd8ff);
    }

    #ofCourseBtn {
      font-size: clamp(1.2rem, 3vw, 2rem);
      padding: 18px 34px;
      background: linear-gradient(135deg, #ff6d7e, #ff9aaa);
      animation-delay: 0.35s;
    }

    .footer {
      position: absolute;
      bottom: max(24px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(1.1rem, 2.2vw, 1.8rem);
      color: #ff6377;
      font-weight: 700;
      width: 100%;
      padding: 0 20px;
    }

    .response {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(255, 194, 226, 0.55);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      z-index: 50;
      padding: 24px;
    }

    .response.show {
      display: flex;
      animation: fadeIn 0.4s ease forwards;
    }

    .message-box {
      position: relative;
      background: rgba(255, 255, 255, 0.94);
      border: 4px solid rgba(255, 106, 130, 0.38);
      border-radius: 34px;
      padding: clamp(34px, 5vw, 64px);
      max-width: 780px;
      width: min(780px, 92vw);
      box-shadow: 0 30px 80px rgba(255, 91, 125, 0.28);
      transform: scale(0.4);
      animation: pop 0.55s cubic-bezier(.17,.89,.32,1.49) forwards;
    }

    .message-box h2 {
      font-size: clamp(2rem, 6vw, 5rem);
      color: #ff5d73;
      margin-bottom: 16px;
    }

    .message-box p {
      font-size: clamp(1rem, 2.6vw, 1.8rem);
      color: #ff7890;
      line-height: 1.5;
      font-weight: 700;
    }

    .close-x {
      position: absolute;
      top: 16px;
      right: 18px;
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #ff8ea0, #ff6d7e);
      font-size: 1.4rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: none;
      box-shadow: 0 10px 22px rgba(255, 91, 125, 0.25);
    }

    .floating-item {
      position: fixed;
      left: 0;
      top: 0;
      pointer-events: none;
      z-index: 20;
      will-change: transform, opacity;
      filter: drop-shadow(0 8px 10px rgba(255, 73, 112, 0.25));
      animation: flyUpMobile linear forwards;
    }

    .pop-heart {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      will-change: transform, opacity;
      animation: heartPop 1.2s ease-out forwards;
    }

    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      will-change: transform, opacity;
      animation: sparklePop 900ms ease-out forwards;
    }

    @keyframes floatTitle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes floatCat {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-14px) rotate(1deg); }
    }

    @keyframes floatButton {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-11px); }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.18); }
      45% { transform: scale(0.96); }
      70% { transform: scale(1.14); }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.75; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes pop {
      0% { transform: scale(0.4) rotate(-7deg); }
      70% { transform: scale(1.08) rotate(2deg); }
      100% { transform: scale(1) rotate(0); }
    }

    @keyframes flyUpMobile {
      0% {
        transform: translate3d(var(--start-x), var(--start-y), 0) rotate(0deg) scale(0.7);
        opacity: 0;
      }
      8% { opacity: 1; }
      100% {
        transform: translate3d(var(--end-x), -90px, 0) rotate(25deg) scale(1.2);
        opacity: 0;
      }
    }

    @keyframes heartPop {
      0% {
        transform: translate(-50%, -50%) scale(0.2) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate(var(--x), var(--y)) scale(1.6) rotate(30deg);
        opacity: 0;
      }
    }

    @keyframes sparklePop {
      0% {
        transform: translate(-50%, -50%) scale(0.2);
        opacity: 1;
      }
      100% {
        transform: translate(var(--x), var(--y)) scale(1.2);
        opacity: 0;
      }
    }

    @media (max-width: 560px) {
      .page {
        justify-content: center;
        padding: 18px 16px 70px;
      }

      h1 {
        font-size: clamp(1.85rem, 9vw, 2.8rem);
        margin-bottom: 24px;
      }

      .cat-card {
        width: 230px;
        height: 180px;
        margin-bottom: 16px;
      }

      .cat {
        width: 170px;
        height: 112px;
        border-width: 6px;
      }

      .cat::before,
      .cat::after {
        top: -36px;
        width: 64px;
        height: 64px;
        border-width: 6px;
      }

      .inner-ear-left,
      .inner-ear-right {
        top: -20px;
        width: 22px;
        height: 22px;
      }

      .inner-ear-left { left: 31px; }
      .inner-ear-right { right: 31px; }

      .face {
        transform: translate(-50%, -50%) scale(0.85);
      }

      .belly {
        width: 76px;
        height: 34px;
      }

      .buttons {
        flex-direction: column;
        gap: 14px;
        width: 100%;
      }

      #yesBtn,
      #ofCourseBtn {
        width: min(280px, 86vw);
        padding: 17px 28px;
      }

      #yesBtn {
        font-size: 2rem;
      }

      #ofCourseBtn {
        font-size: 1.35rem;
      }

      .message-box {
        padding: 62px 24px 34px;
        border-radius: 28px;
      }

      .close-x {
        top: 12px;
        right: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="soft-glow"></div>

    <h1>Will you be my Valentine? <span class="emoji-heart">💝</span></h1>

    <section class="cat-card" aria-label="Cute smiling cat">
      <div class="cat">
        <div class="inner-ear-left"></div>
        <div class="inner-ear-right"></div>
        <div class="paw-heart">💗</div>
        <div class="face">
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="mouth"></div>
        </div>
        <div class="belly"></div>
      </div>
    </section>

    <div class="buttons">
      <button id="yesBtn" type="button">Yes!</button>
      <button id="ofCourseBtn" type="button">Of course! 🥰</button>
    </div>

    <p class="footer">From me to you 💕</p>
  </main>

  <section id="response" class="response" aria-live="polite">
    <div class="message-box">
      <button id="closeX" class="close-x" type="button" aria-label="Close popup">×</button>
      <h2 id="answerTitle">Yaaay! 💖</h2>
      <p id="answerMessage">You just made my whole heart smile. Let's live a life full of adventures, my love! 🎈✨</p>
    </div>
  </section>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const ofCourseBtn = document.getElementById("ofCourseBtn");
    const response = document.getElementById("response");
    const answerTitle = document.getElementById("answerTitle");
    const answerMessage = document.getElementById("answerMessage");
    const closeX = document.getElementById("closeX");

    const floatingSymbols = ["💖", "💕", "💗", "💓", "🎈", "🎉", "✨", "🌸"];

    const answers = {
      yes: {
        title: "You said YES! 💖",
        message: "My heart is doing the happiest little dance right now. Thank you for choosing me, for smiling with me, and for being the sweetest part of my world. I promise to make this Valentine’s memory beautiful for us. 🎈✨"
      },
      ofCourse: {
        title: "Of course? Awww! 🥰",
        message: "That answer is even cuter than I imagined. You are my favourite person, my safe place, and my most beautiful adventure. Let’s make a life full of laughter, love, tiny surprises, and unforgettable moments together. 💕🌙"
      }
    };

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createFlyingItem() {
      const item = document.createElement("span");
      const width = window.innerWidth || document.documentElement.clientWidth;
      const height = window.innerHeight || document.documentElement.clientHeight;
      const startX = randomBetween(8, Math.max(9, width - 60));
      const endX = startX + randomBetween(-60, 60);

      item.className = "floating-item";
      item.textContent = floatingSymbols[Math.floor(Math.random() * floatingSymbols.length)];
      item.style.fontSize = randomBetween(22, width < 560 ? 42 : 58) + "px";
      item.style.animationDuration = randomBetween(3.4, 6.2) + "s";
      item.style.setProperty("--start-x", startX + "px");
      item.style.setProperty("--start-y", height + 50 + "px");
      item.style.setProperty("--end-x", endX + "px");
      document.body.appendChild(item);

      setTimeout(() => item.remove(), 6800);
    }

    function createButtonPop(button) {
      const rect = button.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const isSmallScreen = window.innerWidth < 560;
      const heartCount = isSmallScreen ? 28 : 42;
      const sparkleCount = isSmallScreen ? 14 : 22;
      const distance = isSmallScreen ? 170 : 260;

      for (let i = 0; i < heartCount; i++) {
        const heart = document.createElement("span");
        heart.className = "pop-heart";
        heart.textContent = i % 5 === 0 ? "🎈" : ["💖", "💕", "💗", "💘"][i % 4];
        heart.style.left = centerX + "px";
        heart.style.top = centerY + "px";
        heart.style.fontSize = randomBetween(18, isSmallScreen ? 34 : 42) + "px";
        heart.style.setProperty("--x", randomBetween(-distance, distance) + "px");
        heart.style.setProperty("--y", randomBetween(-distance, distance * 0.7) + "px");
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1300);
      }

      for (let i = 0; i < sparkleCount; i++) {
        const sparkle = document.createElement("span");
        sparkle.className = "sparkle";
        sparkle.textContent = "✨";
        sparkle.style.left = centerX + "px";
        sparkle.style.top = centerY + "px";
        sparkle.style.fontSize = randomBetween(14, isSmallScreen ? 26 : 32) + "px";
        sparkle.style.setProperty("--x", randomBetween(-distance, distance) + "px");
        sparkle.style.setProperty("--y", randomBetween(-distance, distance * 0.65) + "px");
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 1000);
      }
    }

    function celebrate(button, answerType) {
      const chosenAnswer = answers[answerType];
      answerTitle.textContent = chosenAnswer.title;
      answerMessage.textContent = chosenAnswer.message;

      createButtonPop(button);
      response.classList.remove("show");
      void response.offsetWidth;
      response.classList.add("show");

      let count = 0;
      const maxItems = window.innerWidth < 560 ? 48 : 80;
      const party = setInterval(() => {
        createFlyingItem();
        count++;
        if (count > maxItems) clearInterval(party);
      }, 90);
    }

    function closePopup() {
      response.classList.remove("show");
    }

    yesBtn.addEventListener("click", () => celebrate(yesBtn, "yes"));
    ofCourseBtn.addEventListener("click", () => celebrate(ofCourseBtn, "ofCourse"));
    closeX.addEventListener("click", closePopup);

    response.addEventListener("click", (event) => {
      if (event.target === response) {
        closePopup();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closePopup();
      }
    });

    function startFloatingBackground() {
      for (let i = 0; i < 8; i++) {
        setTimeout(createFlyingItem, i * 260);
      }
      setInterval(createFlyingItem, window.innerWidth < 560 ? 700 : 950);
    }

    window.addEventListener("load", startFloatingBackground);
  </script>
</body>
</html>
